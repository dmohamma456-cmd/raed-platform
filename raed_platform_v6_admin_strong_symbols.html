<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0"><title>لوحة المدرس | منصة الرائد</title><style>
:root{--bg:#f8fbff;--card:#ffffffd9;--text:#172033;--muted:#667085;--primary:#2563eb;--primary2:#7c3aed;--line:#e6edf7;--shadow:0 24px 60px rgba(37,99,235,.12);--radius:24px;--danger:#d92d20;--ok:#039855;--warn:#dc6803}*{box-sizing:border-box}body{margin:0;font-family:Tahoma,Arial,sans-serif;color:var(--text);background:radial-gradient(circle at 12% 8%,#dbeafe 0,#fff 30%,transparent 38%),radial-gradient(circle at 90% 0,#ede9fe 0,#fff 28%,transparent 36%),linear-gradient(135deg,#f8fbff,#eef7ff)}.shell{max-width:1200px;margin:auto;padding:22px}.nav{display:flex;justify-content:space-between;align-items:center;background:rgba(255,255,255,.75);backdrop-filter:blur(16px);border:1px solid var(--line);border-radius:28px;padding:14px 18px;box-shadow:var(--shadow)}.brand{display:flex;gap:12px;align-items:center}.logo{width:54px;height:54px;border-radius:18px;background:linear-gradient(135deg,var(--primary),var(--primary2));display:grid;place-items:center;color:white;font-weight:900;font-size:25px}.brand h1{font-size:21px;margin:0}.brand p{margin:4px 0 0;color:var(--muted);font-size:13px}.btn{border:0;border-radius:16px;padding:12px 16px;cursor:pointer;font-weight:800;background:linear-gradient(135deg,var(--primary),var(--primary2));color:white}.btn.secondary{background:white;color:#172033;border:1px solid var(--line)}.btn.danger{background:var(--danger)}.btn.ok{background:var(--ok)}.btn.warn{background:var(--warn)}.hidden{display:none!important}.glass{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px;backdrop-filter:blur(16px);margin-top:22px}.login{max-width:560px;margin:40px auto}.muted{color:var(--muted)}label{display:block;margin:12px 0 7px;font-weight:800}input,select{width:100%;padding:14px;border:1px solid var(--line);border-radius:16px;font-size:15px;background:white}.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}.layout{display:grid;grid-template-columns:280px 1fr;gap:16px}.side .btn{width:100%;margin:6px 0;text-align:right}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.stat{text-align:center}.stat strong{font-size:32px;color:var(--primary)}table{width:100%;border-collapse:collapse;margin-top:12px;background:white;border-radius:16px;overflow:hidden}th,td{border-bottom:1px solid var(--line);padding:11px;text-align:right;font-size:14px}th{background:#f2f6ff}.tabs{display:flex;gap:12px;flex-wrap:wrap}.tabs label{background:white;border:1px solid var(--line);border-radius:14px;padding:10px 12px}.msg{margin-top:12px;padding:13px;border-radius:16px;border:1px solid var(--line);background:#f8fafc}.msg.err{background:#fff1f3;border-color:#fecdd6;color:#b42318}@media(max-width:850px){.layout,.row,.stats{grid-template-columns:1fr}.nav{align-items:flex-start;flex-direction:column}.shell{padding:14px}}
/* تحسينات لوحة المدرس على الموبايل وسفاري */
html{-webkit-text-size-adjust:100%}body{padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}input,select,textarea{font-size:16px}.btn{-webkit-appearance:none;appearance:none;touch-action:manipulation}
@media(max-width:700px){.shell{padding:12px}.nav{align-items:flex-start;gap:12px;border-radius:22px;flex-direction:column}.nav>div:last-child{width:100%;display:grid;grid-template-columns:1fr 1fr;gap:8px}.nav .btn{width:100%}.brand h1{font-size:18px}.brand p{font-size:12px}.logo{width:46px;height:46px}.glass{padding:18px;border-radius:20px}.login{margin:18px auto}.tabs{display:grid;grid-template-columns:1fr 1fr;gap:8px}.tabs .btn{width:100%}table{display:block;overflow-x:auto;white-space:nowrap}input,select{padding:13px}.row,.grid{grid-template-columns:1fr!important}.btn{padding:13px 14px}}

</style></head><body>
<div class="shell"><div class="nav"><div class="brand"><div class="logo">م</div><div><h1>لوحة المدرس</h1><p>إدارة الطلاب والمحاضرات | منصة الرائد التعليمية</p></div></div><a class="btn secondary" href="raed_platform_v2_index.html">فتح بوابة الطالب</a></div>
<section id="login" class="glass login"><h2>دخول المدرس</h2><p class="muted">كلمة المرور الافتراضية: <b>123456</b></p><label>كلمة المرور</label><input id="adminPass" type="password"><button class="btn" style="width:100%;margin-top:14px" onclick="adminLogin()">دخول</button><div id="adminLoginMsg"></div></section>
<section id="panel" class="hidden"><div class="layout"><div class="glass side"><h3>القائمة</h3><button class="btn" onclick="adminTab('dash')">الرئيسية</button><button class="btn secondary" onclick="adminTab('students')">الطلاب والأكواد</button><button class="btn secondary" onclick="adminTab('lectures')">المحاضرات</button><button class="btn secondary" onclick="adminTab('settings')">الإعدادات</button><button class="btn danger" onclick="logoutAdmin()">خروج</button></div><div id="adminContent"></div></div></section></div>
<script>
const COURSES={macro:{name:'اقتصاد كلي'},micro:{name:'اقتصاد جزئي'},accounting:{name:'محاسبة'}};const LS='raed_platform_v2';function uid(){return 'id_'+Math.random().toString(36).slice(2,10)+Date.now().toString(36)}function seed(){return{adminPass:'123456',students:[],lectures:[{id:uid(),course:'macro',title:'محاضرة تجريبية - اقتصاد كلي',url:'https://www.youtube.com/embed/dQw4w9WgXcQ',order:1},{id:uid(),course:'micro',title:'محاضرة تجريبية - اقتصاد جزئي',url:'https://www.youtube.com/embed/dQw4w9WgXcQ',order:1},{id:uid(),course:'accounting',title:'محاضرة تجريبية - محاسبة',url:'https://www.youtube.com/embed/dQw4w9WgXcQ',order:1}],logs:[]}}function db(){let d=localStorage.getItem(LS);if(!d){localStorage.setItem(LS,JSON.stringify(seed()));return seed()}return JSON.parse(d)}function save(d){localStorage.setItem(LS,JSON.stringify(d))}function msg(el,t,c=''){document.getElementById(el).innerHTML=`<div class="msg ${c}">${t}</div>`}
function adminLogin(){if(adminPass.value===db().adminPass){login.classList.add('hidden');panel.classList.remove('hidden');adminTab('dash')}else msg('adminLoginMsg','كلمة المرور غير صحيحة.','err')}function logoutAdmin(){panel.classList.add('hidden');login.classList.remove('hidden')}function adminTab(t){if(t==='dash')renderDash();if(t==='students')renderStudents();if(t==='lectures')renderLectures();if(t==='settings')renderSettings()}
function renderDash(){const d=db();adminContent.innerHTML=`<div class="stats"><div class="glass stat"><strong>${d.students.length}</strong><p>طالب</p></div><div class="glass stat"><strong>${d.lectures.length}</strong><p>محاضرة</p></div><div class="glass stat"><strong>${d.students.filter(s=>s.status==='active').length}</strong><p>نشط</p></div><div class="glass stat"><strong>${d.logs.length}</strong><p>دخول</p></div></div><div class="glass"><h3>آخر عمليات الدخول</h3>${d.logs.slice(-8).reverse().map(l=>`<p>${l.student} - ${new Date(l.time).toLocaleString('ar-JO')}</p>`).join('')||'<p class="muted">لا يوجد دخول بعد.</p>'}</div>`}
function genCode(){const letters='ABCDEFGHJKLMNPQRSTUVWXYZ';const nums='23456789';const symbols='!@#$%&*?+-_';const all=letters+nums+symbols;let code=[];function pick(str){const arr=new Uint32Array(1);if(window.crypto&&crypto.getRandomValues){crypto.getRandomValues(arr);return str[arr[0]%str.length]}return str[Math.floor(Math.random()*str.length)]}code.push(pick(letters),pick(nums),pick(symbols));while(code.length<16)code.push(pick(all));for(let i=code.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[code[i],code[j]]=[code[j],code[i]]}return code.join('')}function normalizeCode(v){return String(v||'').replace(/[^A-Za-z0-9!@#$%&*?+\-_]/g,'').toUpperCase()}function renderStudents(){const d=db();adminContent.innerHTML=`<div class="glass"><h2>إضافة طالب / إنشاء كود</h2><div class="row"><div><label>اسم الطالب</label><input id="stName"></div><div><label>رقم الهاتف</label><input id="stPhone"></div></div><label>المواد المشترك بها</label><div class="tabs"><label><input type="checkbox" class="courseChk" value="macro"> اقتصاد كلي</label><label><input type="checkbox" class="courseChk" value="micro"> اقتصاد جزئي</label><label><input type="checkbox" class="courseChk" value="accounting"> محاسبة</label></div><div class="row"><div><label>تاريخ انتهاء الاشتراك</label><input id="stExp" type="date"></div><div><label>كود التفعيل 16 خانة: حروف + أرقام + رموز</label><input id="stCode" maxlength="16" value="${genCode()}" oninput="this.value=normalizeCode(this.value).slice(0,16)"></div></div><button class="btn ok" style="margin-top:12px" onclick="addStudent()">حفظ الطالب</button></div><div class="glass"><h2>الطلاب</h2><table><thead><tr><th>الاسم</th><th>الهاتف</th><th>الكود</th><th>المواد</th><th>الجهاز</th><th>إجراء</th></tr></thead><tbody>${d.students.map(s=>`<tr><td>${s.name}</td><td>${s.phone}</td><td><b>${s.code}</b></td><td>${s.courses.map(c=>COURSES[c].name).join('، ')}</td><td>${s.device?'مربوط':'غير مربوط'}</td><td><button class="btn warn" onclick="resetDevice('${s.id}')">تصفير</button> <button class="btn danger" onclick="delStudent('${s.id}')">حذف</button></td></tr>`).join('')}</tbody></table></div>`}
function addStudent(){const d=db();const courses=[...document.querySelectorAll('.courseChk:checked')].map(x=>x.value);const cleanCode=normalizeCode(stCode.value);if(!stName.value.trim()||!stPhone.value.trim()||!cleanCode||!courses.length){alert('أكمل البيانات واختر مادة.');return}if(cleanCode.length!==16){alert('كود التفعيل يجب أن يتكون من 16 خانة ويُفضّل أن يحتوي على حروف وأرقام ورموز.');return}if(!/[A-Z]/.test(cleanCode)||!/[0-9]/.test(cleanCode)||!/[!@#$%&*?+\-_]/.test(cleanCode)){alert('الكود يجب أن يحتوي على حرف واحد ورقم واحد ورمز واحد على الأقل.');return}if(d.students.some(s=>s.code===cleanCode)){alert('هذا الكود موجود مسبقًا. اضغط تحديث الصفحة لتوليد كود جديد.');return}d.students.push({id:uid(),name:stName.value.trim(),phone:stPhone.value.trim(),code:cleanCode,courses,status:'active',expires:stExp.value,device:'',createdAt:new Date().toISOString()});save(d);renderStudents()}function resetDevice(id){const d=db();const s=d.students.find(x=>x.id===id);if(s){s.device='';save(d);renderStudents()}}function delStudent(id){if(!confirm('حذف الطالب؟'))return;const d=db();d.students=d.students.filter(x=>x.id!==id);save(d);renderStudents()}
function renderLectures(){const d=db();adminContent.innerHTML=`<div class="glass"><h2>إضافة محاضرة</h2><div class="row"><div><label>المادة</label><select id="lecCourse"><option value="macro">اقتصاد كلي</option><option value="micro">اقتصاد جزئي</option><option value="accounting">محاسبة</option></select></div><div><label>ترتيب المحاضرة</label><input id="lecOrder" type="number" value="1"></div></div><label>عنوان المحاضرة</label><input id="lecTitle" placeholder="مثال: المحاضرة الأولى"><label>رابط الفيديو</label><input id="lecUrl" placeholder="رابط YouTube أو Google Drive أو mp4"><button class="btn ok" style="margin-top:12px" onclick="addLecture()">إضافة المحاضرة</button></div><div class="glass"><h2>المحاضرات الحالية</h2><table><thead><tr><th>المادة</th><th>العنوان</th><th>الترتيب</th><th>إجراء</th></tr></thead><tbody>${d.lectures.map(l=>`<tr><td>${COURSES[l.course].name}</td><td>${l.title}</td><td>${l.order||''}</td><td><button class="btn danger" onclick="delLecture('${l.id}')">حذف</button></td></tr>`).join('')}</tbody></table></div>`}function addLecture(){const d=db();if(!lecTitle.value.trim()||!lecUrl.value.trim()){alert('أدخل العنوان والرابط.');return}d.lectures.push({id:uid(),course:lecCourse.value,title:lecTitle.value.trim(),url:lecUrl.value.trim(),order:Number(lecOrder.value||1),createdAt:new Date().toISOString()});save(d);renderLectures()}function delLecture(id){if(!confirm('حذف المحاضرة؟'))return;const d=db();d.lectures=d.lectures.filter(x=>x.id!==id);save(d);renderLectures()}
function renderSettings(){adminContent.innerHTML=`<div class="glass"><h2>الإعدادات</h2><label>كلمة مرور جديدة</label><input id="newPass" type="password"><button class="btn" style="margin-top:12px" onclick="changePass()">تغيير كلمة المرور</button><hr><h3>نسخ احتياطي</h3><button class="btn secondary" onclick="exportData()">تصدير البيانات</button><label style="margin-top:12px">استيراد نسخة</label><input type="file" id="importFile" accept="application/json" onchange="importData(event)"><div class="msg">هذه نسخة محلية. لاحقًا نربطها بـ Firebase لتعمل لكل الطلاب على الإنترنت.</div></div>`}function changePass(){const d=db();if(!newPass.value.trim())return alert('أدخل كلمة مرور.');d.adminPass=newPass.value.trim();save(d);alert('تم تغيير كلمة المرور.')}function exportData(){const blob=new Blob([JSON.stringify(db(),null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='raed-platform-backup.json';a.click()}function importData(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{JSON.parse(r.result);localStorage.setItem(LS,r.result);alert('تم الاستيراد.');renderDash()}catch{alert('ملف غير صالح')}};r.readAsText(f)}db();</script></body></html>
